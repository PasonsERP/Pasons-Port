<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pasons Port — Suggestion Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root {
  --ink: #0a0a0f;
  --ink2: #1c1c28;
  --surface: #ffffff;
  --surface2: #f4f4f8;
  --surface3: #ebebf2;
  --accent: #4f46e5;
  --accent2: #7c3aed;
  --accent-light: #ede9fe;
  --green: #059669;
  --green-light: #d1fae5;
  --amber: #d97706;
  --amber-light: #fef3c7;
  --red: #dc2626;
  --red-light: #fee2e2;
  --border: rgba(10,10,15,0.08);
  --border2: rgba(10,10,15,0.14);
  --radius: 14px;
  --radius-lg: 20px;
  --shadow: 0 2px 16px rgba(10,10,15,0.07), 0 1px 4px rgba(10,10,15,0.04);
  --shadow-lg: 0 8px 40px rgba(10,10,15,0.12), 0 2px 8px rgba(10,10,15,0.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;background:#f0f0f7;color:var(--ink);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(79,70,229,0.06) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(124,58,237,0.05) 0%,transparent 50%);pointer-events:none;z-index:0}
.shell{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;background:rgba(255,255,255,0.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-0.3px;color:var(--ink);display:flex;align-items:center;gap:10px}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;display:inline-block}
.user-chip{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--ink)}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center}
.btn-logout{background:none;border:1px solid var(--border2);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all 0.15s}
.btn-logout:hover{background:var(--surface2)}
.main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:40px 24px 80px}
.page{width:100%;max-width:640px}
.page-wide{width:100%;max-width:880px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:36px;margin-bottom:20px}
.card-sm{padding:24px}
.auth-hero{text-align:center;margin-bottom:32px}
.auth-hero h1{font-family:'Syne',sans-serif;font-weight:800;font-size:32px;line-height:1.15;letter-spacing:-0.8px;color:var(--ink);margin-bottom:10px}
.auth-hero p{color:#6b6b80;font-size:15px}
.phase-badge{display:inline-flex;align-items:center;gap:6px;background:var(--accent-light);color:var(--accent);font-size:11.5px;font-weight:500;padding:5px 12px;border-radius:100px;margin-bottom:20px;letter-spacing:0.2px}
.phase-badge .dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(0.8)}}
.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:500;color:#5a5a72;margin-bottom:7px;letter-spacing:0.1px}
.field input,.field select,.field textarea{width:100%;padding:13px 16px;border:1.5px solid var(--border2);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink);background:var(--surface);transition:border-color 0.2s,box-shadow 0.2s;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,0.1)}
.field input::placeholder{color:#b0b0c8}
.btn{width:100%;padding:14px 20px;border:none;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-weight:500;font-size:15px;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--ink);color:white}
.btn-primary:hover{background:var(--ink2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(10,10,15,0.2)}
.btn-secondary{background:var(--surface2);color:var(--ink);border:1px solid var(--border2)}
.btn-secondary:hover{background:var(--surface3)}
.btn-accent{background:var(--accent);color:white}
.btn-accent:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,70,229,0.35)}
.btn-danger{background:var(--red);color:white}
.btn-danger:hover{opacity:0.9}
.btn-sm{padding:9px 18px;font-size:13.5px;width:auto;border-radius:10px}
.btn:disabled{opacity:0.45;cursor:not-allowed;transform:none!important}
.link-btn{background:none;border:none;cursor:pointer;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:14px;text-decoration:underline;text-underline-offset:3px;padding:0}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#b0b0c8;font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.toast{padding:13px 16px;border-radius:10px;font-size:14px;margin-top:14px;display:none}
.toast.show{display:block}
.toast-success{background:var(--green-light);color:#065f46}
.toast-error{background:var(--red-light);color:#991b1b}
.toast-info{background:var(--accent-light);color:#3730a3}
.phase-strip{display:flex;gap:0;background:var(--surface2);border-radius:12px;padding:4px;margin-bottom:28px;border:1px solid var(--border)}
.phase-step{flex:1;text-align:center;padding:9px 8px;border-radius:9px;font-size:12.5px;font-weight:500;color:#9090a8;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:4px}
.phase-step i{width:14px;height:14px}
.phase-step.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 4px rgba(10,10,15,0.1)}
.phase-step.done{color:var(--green)}
.page-head{margin-bottom:24px}
.page-head h2{font-family:'Syne',sans-serif;font-weight:700;font-size:24px;letter-spacing:-0.4px;color:var(--ink);margin-bottom:6px}
.page-head p{color:#6b6b80;font-size:14.5px}
.suggestion-list{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.sug-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:14.5px;gap:10px;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.sug-item .sug-name{font-weight:500;color:var(--ink);flex:1}
.sug-item .sug-by{font-size:12.5px;color:#9090a8}
.sug-check{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}
.sug-own-badge{font-size:11px;padding:2px 8px;background:var(--accent-light);color:var(--accent);border-radius:100px;font-weight:500}
.vote-list{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.vote-option{display:flex;align-items:center;gap:14px;border:1.5px solid var(--border2);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:all 0.18s;background:var(--surface)}
.vote-option:hover{border-color:var(--accent);background:#fbfaff}
.vote-option.selected{border-color:var(--accent);background:var(--accent-light);box-shadow:0 0 0 3px rgba(79,70,229,0.1)}
.vote-radio{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}
.vote-label{font-size:15px;font-weight:500;color:var(--ink)}
.voted-label{font-size:15px;font-weight:500;color:var(--ink);flex:1}
.vote-bar-wrap{flex:1;height:6px;background:var(--surface3);border-radius:100px;overflow:hidden;margin:0 12px}
.vote-bar{height:100%;background:var(--accent);border-radius:100px;transition:width 0.5s ease}
.vote-count-label{font-size:13px;color:#6b6b80;min-width:40px;text-align:right;font-weight:500}
.result-item{display:flex;align-items:center;gap:14px;padding:16px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);margin-bottom:10px}
.result-item.winner{background:linear-gradient(135deg,#fef9ec,#fffbf0);border-color:#fbbf24}
.result-rank{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;color:#b0b0c8;width:28px;text-align:center}
.result-item.winner .result-rank{color:#f59e0b}
.result-name{flex:1;font-weight:500;font-size:15.5px}
.result-author{font-size:12px;color:#6b6b80;margin-left:8px}
.result-votes{font-size:13px;color:#6b6b80;white-space:nowrap}
.status-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;padding:4px 11px;border-radius:100px}
.status-tag i{width:12px;height:12px}
.tag-suggestion{background:var(--amber-light);color:#92400e}
.tag-poll{background:var(--accent-light);color:#3730a3}
.tag-finished{background:var(--green-light);color:#065f46}
.empty{text-align:center;padding:32px 16px;color:#9090a8;font-size:14px}
.empty-icon{font-size:40px;margin-bottom:10px}
.admin-layout{display:flex;min-height:calc(100vh - 72px)}
.admin-sidebar{width:240px;background:var(--ink2);color:white;padding:24px 0;flex-shrink:0}
.admin-sidebar h2{font-family:'Syne',sans-serif;font-size:18px;padding:0 24px 20px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:20px;color:white;display:flex;align-items:center;gap:8px}
.admin-sidebar a{display:flex;align-items:center;gap:10px;padding:12px 24px;color:#cbd5e1;text-decoration:none;font-size:14px;transition:0.2s;cursor:pointer}
.admin-sidebar a i{width:16px;height:16px}
.admin-sidebar a:hover,.admin-sidebar a.active{background:rgba(255,255,255,0.05);color:white}
.admin-content{flex:1;padding:32px;overflow-y:auto}
.stats-row{display:flex;gap:12px;margin-bottom:20px}
.stat-card{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat-val{font-size:26px;font-weight:700;color:var(--ink)}
.stat-lbl{font-size:12px;color:#9090a8;margin-top:2px}
.admin-table{width:100%;border-collapse:collapse;font-size:14px}
.admin-table th,.admin-table td{text-align:left;padding:12px 8px;border-bottom:1px solid var(--border)}
.admin-table th{font-weight:600;color:#475569;font-size:13px}
.hidden{display:none!important}
.mt8{margin-top:8px}
.mt16{margin-top:16px}
.text-center{text-align:center}
.text-sm{font-size:13.5px;color:#6b6b80}
@media(max-width:800px){.admin-layout{flex-direction:column}.admin-sidebar{width:100%;padding:12px 16px}}
.contest-card{border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface);box-shadow:var(--shadow);padding:24px;margin-bottom:24px}
.contest-card h3{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;margin-bottom:4px}
.contest-card .meta{color:#6b6b80;font-size:14px;margin-bottom:12px}
</style>
</head>
<body>
<div class="shell">
  <header class="top-bar">
    <div class="logo"><span class="logo-dot"></span> PASONS PORT</div>
    <div id="topUserArea" class="user-chip hidden">
      <div id="topAvatar" class="avatar"></div>
      <span id="topName" style="font-size:14px;"></span>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </header>

  <main class="main">
    <!-- LOGIN -->
    <div id="pageLogin" class="page">
      <div class="auth-hero"><div class="phase-badge"><span class="dot"></span> Employee Portal</div><h1>Suggestion & <br/>Nomination Portal</h1><p>Sign in with your employee ID.</p></div>
      <div class="card">
        <div class="field"><label>Employee ID</label><input type="text" id="loginId" placeholder="e.g. EMP001" onkeydown="if(event.key==='Enter')login()"/></div>
        <button class="btn btn-primary" onclick="login()" id="loginBtn">Sign In</button>
        <div id="loginMsg" class="toast"></div>
        <div class="divider">or</div>
        <p class="text-center text-sm">New? <button class="link-btn" onclick="showPage('pageRegister')">Register</button></p>
      </div>
    </div>

    <!-- REGISTER -->
    <div id="pageRegister" class="page hidden">
      <div class="auth-hero"><h1>Create Account</h1></div>
      <div class="card">
        <div class="field"><label>Employee ID</label><input type="text" id="regId" placeholder="e.g. EMP001"/></div>
        <div class="field"><label>Full Name</label><input type="text" id="regName" placeholder="Your full name"/></div>
        <button class="btn btn-primary" onclick="register()" id="regBtn">Create Account</button>
        <div id="regMsg" class="toast"></div>
        <div class="divider">or</div>
        <p class="text-center text-sm">Already registered? <button class="link-btn" onclick="showPage('pageLogin')">Sign in</button></p>
      </div>
    </div>

    <!-- EMPLOYEE (multi-contest) -->
    <div id="pageEmployee" class="page hidden">
      <div class="page-head"><h2>Active Contests</h2><p>Participate in all ongoing Suggestion campaigns.</p></div>
      <div id="employeeContestsContainer"></div>
      <div class="text-center mt16"><button class="btn btn-secondary btn-sm" onclick="renderEmployeeView()"><i data-lucide="refresh-cw"></i> Refresh</button></div>
    </div>

    <!-- ADMIN (sidebar unchanged) -->
    <div id="pageAdmin" class="page-wide hidden">
      <div class="admin-layout">
        <div class="admin-sidebar">
          <h2><i data-lucide="sliders" style="width:20px;height:20px;"></i> Admin</h2>
          <a class="active" onclick="switchAdminTab('overview')"><i data-lucide="layout-dashboard"></i> Overview</a>
          <a onclick="switchAdminTab('activeContest')"><i data-lucide="play-circle"></i> Active Contests</a>
          <a onclick="switchAdminTab('allContests')"><i data-lucide="list"></i> All Contests</a>
          <a onclick="switchAdminTab('employees')"><i data-lucide="users"></i> Employees</a>
        </div>
        <div id="adminContentArea" class="admin-content"></div>
      </div>
    </div>
  </main>
</div>

<script>
const SUPABASE_URL = 'https://ooalljqzldtqelvvtnri.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vYWxsanF6bGR0cWVsdnZ0bnJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjE4NzcsImV4cCI6MjA5MjU5Nzg3N30.KhPqEiCvgDKQLdYX-kLYNRejeNgilZYot6_slYFhYXY';

let db = null;
let ME = null;
let activeContests = []; // array of non-finished contests
let employeeInterval = null;

window.addEventListener('load', () => {
  try { db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); }
  catch(e) { alert('DB connection failed.'); return; }
  showPage('pageLogin');
});

function showPage(id) {
  ['pageLogin','pageRegister','pageEmployee','pageAdmin'].forEach(p => document.getElementById(p).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  if (id === 'pageAdmin') lucide.createIcons();
}

function showTopBar(show) {
  const el = document.getElementById('topUserArea');
  if (show) {
    el.classList.remove('hidden');
    const initials = (ME.full_name || ME.employee_id).split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('topAvatar').textContent = initials;
    document.getElementById('topName').textContent = ME.full_name || ME.employee_id;
  } else el.classList.add('hidden');
}

function toast(elId, msg, type='info') {
  const el = document.getElementById(elId);
  el.textContent = msg;
  el.className = `toast toast-${type} show`;
  if (type !== 'error') setTimeout(() => el.classList.remove('show'), 4000);
}

async function login() {
  const id = document.getElementById('loginId').value.trim().toUpperCase();
  if (!id) { toast('loginMsg','Enter Employee ID.','error'); return; }
  setLoading('loginBtn', true);
  const { data, error } = await db.from('employees').select('*').eq('employee_id', id).maybeSingle();
  if (error || !data) { toast('loginMsg','ID not found.','error'); setLoading('loginBtn', false); return; }
  if (data.status !== 'approved') { toast('loginMsg','Account pending approval.','error'); setLoading('loginBtn', false); return; }
  ME = data;
  setLoading('loginBtn', false);
  showTopBar(true);
  if (ME.role === 'admin') { showPage('pageAdmin'); switchAdminTab('overview'); }
  else { showPage('pageEmployee'); await renderEmployeeView(); startAutoRefresh(); }
}

async function register() {
  const id = document.getElementById('regId').value.trim().toUpperCase();
  const name = document.getElementById('regName').value.trim();
  if (!id || !name) { toast('regMsg','All fields required.','error'); return; }
  setLoading('regBtn', true);
  const { error } = await db.from('employees').insert({ employee_id: id, full_name: name, role: 'employee', status: 'pending' });
  toast('regMsg', error ? (error.message.includes('duplicate')?'ID already exists.':error.message) : '✅ Registered! Awaiting approval.','success');
  setLoading('regBtn', false);
}

function logout() {
  clearInterval(employeeInterval);
  ME = null;
  activeContests = [];
  showTopBar(false);
  showPage('pageLogin');
}

function startAutoRefresh() {
  clearInterval(employeeInterval);
  employeeInterval = setInterval(renderEmployeeView, 12000);
}

/* -----------------------------------------------------
   EMPLOYEE MULTI‑CONTEST VIEW
----------------------------------------------------- */
async function renderEmployeeView() {
  const { data } = await db.from('contests').select('*').neq('status','finished').order('id', {ascending: false});
  activeContests = data || [];
  const container = document.getElementById('employeeContestsContainer');
  if (!activeContests.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon"><i data-lucide="inbox"></i></div>No active campaigns.</div>';
    lucide.createIcons();
    return;
  }

  let html = '';
  for (let c of activeContests) {
    html += `<div class="contest-card">
      <h3>${esc(c.title)} <span class="status-tag tag-${c.status}"><i data-lucide="${c.status==='suggestion'?'lightbulb':c.status==='poll'?'check-square':'trophy'}"></i>${c.status}</span></h3>
      <div class="meta">${esc(c.description || '')} | Type: ${esc(c.type_label || 'General')} | Ends: ${c.suggestion_end ? new Date(c.suggestion_end).toLocaleString() : 'N/A'}</div>`;

    if (c.status === 'suggestion') {
      html += `
        <div class="field"><label>Your suggestion</label>
          <div style="display:flex;gap:8px;">
            <input type="text" id="sugInput_${c.id}" placeholder="Enter a name..." maxlength="80"/>
            <button class="btn btn-accent btn-sm" onclick="submitSuggestion(${c.id})">Submit</button>
          </div>
          <div id="sugMsg_${c.id}" class="toast"></div>
        </div>
        <div class="suggestion-list" id="sugList_${c.id}"></div>`;
    } else if (c.status === 'poll') {
      html += `
        <div id="pollArea_${c.id}">
          <div id="voteBanner_${c.id}" class="hidden" style="margin-bottom:12px;"><i data-lucide="check-circle" style="width:18px;height:18px;color:var(--green)"></i> You voted. Live results:</div>
          <div id="pollOpts_${c.id}" class="vote-list"></div>
          <div id="voteActions_${c.id}" class="mt16"><button class="btn btn-accent btn-sm" onclick="submitVote(${c.id})">Submit Vote</button></div>
          <div id="liveResults_${c.id}" class="hidden mt20"></div>
        </div>`;
    } else if (c.status === 'finished') {
      html += `<div id="results_${c.id}"></div>`;
    }
    html += `</div>`;
  }
  container.innerHTML = html;
  lucide.createIcons();

  // Load dynamic data per contest
  for (let c of activeContests) {
    if (c.status === 'suggestion') {
      await loadSuggestionsForContest(c.id, `sugList_${c.id}`);
    } else if (c.status === 'poll') {
      await loadPollForContest(c.id);
    } else if (c.status === 'finished') {
      await loadResultsForContest(c.id, `results_${c.id}`);
    }
  }
}

async function loadSuggestionsForContest(contestId, listId) {
  const { data } = await db.from('suggestions')
    .select('id, name_text, employee_id, employees(full_name)')
    .eq('contest_id', contestId).order('id', {ascending: false});
  const container = document.getElementById(listId);
  container.innerHTML = (!data || !data.length) ? '<div class="empty"><div class="empty-icon"><i data-lucide="message-circle"></i></div>No suggestions yet.</div>' :
    data.map(s => `<div class="sug-item"><span class="sug-name">${esc(s.name_text)}</span><span class="sug-by">${esc(s.employees?.full_name||s.employee_id)}</span>${s.employee_id===ME.employee_id?'<span class="sug-own-badge">You</span>':''}</div>`).join('');
  lucide.createIcons();
}

async function submitSuggestion(contestId) {
  const input = document.getElementById(`sugInput_${contestId}`);
  const msg = document.getElementById(`sugMsg_${contestId}`);
  const text = input.value.trim();
  if (!text) { toast(`sugMsg_${contestId}`, 'Enter a name.', 'error'); return; }
  const { error } = await db.from('suggestions').insert({ contest_id: contestId, employee_id: ME.employee_id, name_text: text });
  if (error) toast(`sugMsg_${contestId}`, error.message, 'error');
  else { toast(`sugMsg_${contestId}`, 'Suggestion submitted!', 'success'); input.value = ''; await loadSuggestionsForContest(contestId, `sugList_${contestId}`); }
}

async function loadPollForContest(contestId) {
  const { data: myVote } = await db.from('votes').select('id,shortlist_id').eq('contest_id',contestId).eq('employee_id',ME.employee_id).maybeSingle();
  const { data: opts } = await db.from('shortlist').select('id, suggestions(name_text)').eq('contest_id',contestId);

  const actions = document.getElementById(`voteActions_${contestId}`);
  const banner = document.getElementById(`voteBanner_${contestId}`);
  const liveDiv = document.getElementById(`liveResults_${contestId}`);
  const optContainer = document.getElementById(`pollOpts_${contestId}`);

  if (myVote) {
    banner.classList.remove('hidden');
    actions.classList.add('hidden');
    optContainer.innerHTML = '';
    liveDiv.classList.remove('hidden');
    await updateLiveResults(contestId, liveDiv);
  } else {
    banner.classList.add('hidden');
    actions.classList.remove('hidden');
    liveDiv.classList.add('hidden');
    optContainer.innerHTML = (!opts||!opts.length) ? '<div class="empty">No options available.</div>' :
      opts.map(o => `<label class="vote-option" onclick="selectVote(this)"><input type="radio" class="vote-radio" name="voteOpt_${contestId}" value="${o.id}"><span class="vote-label">${esc(o.suggestions?.name_text||'?')}</span></label>`).join('');
  }
}

async function updateLiveResults(contestId, container) {
  const { data: shortlist } = await db.from('shortlist').select('id, suggestions(name_text)').eq('contest_id', contestId);
  const { data: votes } = await db.from('votes').select('shortlist_id').eq('contest_id', contestId);
  const counts = {}; (votes||[]).forEach(v => counts[v.shortlist_id]=(counts[v.shortlist_id]||0)+1);
  const total = (votes||[]).length;
  const items = (shortlist||[]).map(s => ({ name: s.suggestions?.name_text||'?', count: counts[s.id]||0 })).sort((a,b)=>b.count-a.count);
  container.innerHTML = '<div class="section-label text-sm">Live Vote Counts</div>' + items.map(o => {
    const pct = total ? Math.round(o.count/total*100) : 0;
    return `<div class="vote-option" style="cursor:default;margin-bottom:8px;"><span class="voted-label">${esc(o.name)}</span><div class="vote-bar-wrap"><div class="vote-bar" style="width:${pct}%"></div></div><span class="vote-count-label">${o.count} (${pct}%)</span></div>`;
  }).join('');
}

function selectVote(el) {
  document.querySelectorAll('.vote-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

async function submitVote(contestId) {
  const sel = document.querySelector(`input[name="voteOpt_${contestId}"]:checked`);
  if (!sel) { alert('Please select an option.'); return; }
  const shortlistId = parseInt(sel.value);
  const { error } = await db.from('votes').insert({ contest_id: contestId, employee_id: ME.employee_id, shortlist_id: shortlistId });
  if (error) {
    if (error.message.includes('duplicate')) alert('Already voted.');
    else alert(error.message);
  } else {
    await loadPollForContest(contestId); // refresh UI to show live results
  }
}

async function loadResultsForContest(contestId, containerId) {
  const { data: shortlist } = await db.from('shortlist')
    .select('id, suggestions(name_text, employee_id, employees(full_name))')
    .eq('contest_id', contestId);
  const { data: votes } = await db.from('votes').select('shortlist_id').eq('contest_id', contestId);
  const counts = {}; (votes||[]).forEach(v => counts[v.shortlist_id]=(counts[v.shortlist_id]||0)+1);
  const results = (shortlist||[]).map(s => ({
    name: s.suggestions?.name_text,
    author: s.suggestions?.employees?.full_name || s.suggestions?.employee_id || 'Unknown',
    count: counts[s.id]||0
  })).sort((a,b)=>b.count-a.count);

  document.getElementById(containerId).innerHTML = results.map((r,i) => `
    <div class="result-item ${i===0?'winner':''}">
      <span class="result-rank">${i===0?'<i data-lucide="trophy"></i>':`#${i+1}`}</span>
      <span class="result-name">${esc(r.name)}<span class="result-author">by ${esc(r.author)}</span></span>
      <span class="result-votes">${r.count} vote${r.count!==1?'s':''}</span>
    </div>`).join('');
  lucide.createIcons();
}

/* -----------------------------------------------------
   ADMIN
----------------------------------------------------- */
function switchAdminTab(tab) {
  document.querySelectorAll('.admin-sidebar a').forEach(a => a.classList.remove('active'));
  const icons = { overview:'layout-dashboard', activeContest:'play-circle', allContests:'list', employees:'users' };
  document.querySelector(`.admin-sidebar a i[data-lucide="${icons[tab]}"]`)?.parentElement?.classList.add('active');
  switch(tab) {
    case 'overview': renderAdminOverview(); break;
    case 'activeContest': renderAdminActiveContests(); break;
    case 'allContests': renderAdminAllContests(); break;
    case 'employees': renderAdminEmployees(); break;
  }
}

async function renderAdminOverview() {
  const { count: empCount } = await db.from('employees').select('*',{count:'exact',head:true});
  const { data: contests } = await db.from('contests').select('*');
  const activeCnt = contests?.filter(c=>c.status!=='finished').length||0;
  const finishedCnt = contests?.filter(c=>c.status==='finished').length||0;
  document.getElementById('adminContentArea').innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val">${empCount||0}</div><div class="stat-lbl">Employees</div></div>
      <div class="stat-card"><div class="stat-val">${activeCnt}</div><div class="stat-lbl">Active</div></div>
      <div class="stat-card"><div class="stat-val">${finishedCnt}</div><div class="stat-lbl">Finished</div></div>
    </div>
    <div class="card"><h2>Quick Actions</h2>
      <button class="btn btn-accent btn-sm mt16" onclick="switchAdminTab('activeContest')">Manage Active Contests</button>
      <button class="btn btn-secondary btn-sm mt8" onclick="switchAdminTab('employees')">Review Employees</button>
    </div>`;
  lucide.createIcons();
}

async function renderAdminActiveContests() {
  const { data: contests } = await db.from('contests').select('*').neq('status','finished').order('id',{ascending:false});
  let html = `<div class="page-head"><h2>Active Contests</h2></div>`;
  html += `<div class="card card-sm"><button class="btn btn-accent" onclick="createContestForm()">+ Create New Contest</button></div><div id="createContestForm" class="hidden card card-sm mt16"></div>`;
  if (!contests || !contests.length) html += '<p>No active contests.</p>';
  else {
    for (let c of contests) {
      html += `<div class="contest-card" id="adminContest_${c.id}">
        <h3>${esc(c.title)} <span class="status-tag tag-${c.status}"><i data-lucide="${c.status==='suggestion'?'lightbulb':c.status==='poll'?'check-square':'trophy'}"></i>${c.status}</span></h3>
        <div class="meta">${esc(c.description||'')} | Type: ${esc(c.type_label||'General')} | Deadline: ${new Date(c.suggestion_end).toLocaleString()}</div>`;
      if (c.status === 'suggestion') {
        html += `<div id="adminSugSection_${c.id}"></div>`;
      } else if (c.status === 'poll') {
        html += `<div id="adminPollSection_${c.id}"></div>`;
      }
      html += `<div class="mt8">
        <button class="btn btn-danger btn-sm" onclick="deleteContestById(${c.id})"><i data-lucide="trash-2"></i> Delete</button>
        <button class="btn btn-secondary btn-sm" onclick="editContestInline(${c.id})"><i data-lucide="edit-3"></i> Edit</button>
      </div></div>`;
    }
  }
  document.getElementById('adminContentArea').innerHTML = html;
  lucide.createIcons();

  // Load specific data for each active contest
  for (let c of contests) {
    if (c.status === 'suggestion') {
      await loadAdminSuggestionsFor(c.id);
    } else if (c.status === 'poll') {
      await loadAdminPollFor(c.id);
    }
  }
}

function createContestForm() {
  document.getElementById('createContestForm').classList.toggle('hidden');
  document.getElementById('createContestForm').innerHTML = `
    <div class="field"><label>Title</label><input type="text" id="newTitle"></div>
    <div class="field"><label>Description</label><input type="text" id="newDesc"></div>
    <div class="field"><label>Type</label><input type="text" id="newType" placeholder="e.g. Product"></div>
    <div class="field"><label>Suggestion Deadline</label><input type="datetime-local" id="newDeadline"></div>
    <button class="btn btn-accent" onclick="createContest()">Create</button>
    <div id="createMsg" class="toast"></div>`;
  lucide.createIcons();
}

async function createContest() {
  const title = document.getElementById('newTitle').value.trim();
  const desc = document.getElementById('newDesc').value.trim();
  const type = document.getElementById('newType').value.trim();
  const deadline = document.getElementById('newDeadline').value;
  if (!title || !deadline) { toast('createMsg','Title & deadline required.','error'); return; }
  const { error } = await db.from('contests').insert({ title, description: desc, type_label: type, suggestion_end: new Date(deadline).toISOString(), status:'suggestion', created_by:ME.employee_id });
  if (error) toast('createMsg', error.message, 'error');
  else { toast('createMsg','Contest created!','success'); setTimeout(() => renderAdminActiveContests(), 1000); }
}

async function loadAdminSuggestionsFor(contestId) {
  const { data } = await db.from('suggestions')
    .select('id, name_text, employee_id, employees(full_name)')
    .eq('contest_id', contestId).order('id', {ascending: true});
  const container = document.getElementById(`adminSugSection_${contestId}`);
  container.innerHTML = `
    <div class="field" style="margin-top:12px;"><label>Add your own suggestion</label>
      <div style="display:flex;gap:8px;"><input type="text" id="adminSugInput_${contestId}" placeholder="Idea...">
      <button class="btn btn-accent btn-sm" onclick="adminAddSuggestion(${contestId})">Add</button></div>
      <div id="adminOwnSugMsg_${contestId}" class="toast"></div>
    </div>
    <div class="section-label text-sm">All Suggestions</div>
    <div id="adminSugList_${contestId}" class="suggestion-list"></div>
    <button class="btn btn-danger mt16" onclick="launchPollFor(${contestId})">🚀 Shortlist & Launch Poll</button>
    <div id="adminSugMsg_${contestId}" class="toast"></div>`;

  const listEl = document.getElementById(`adminSugList_${contestId}`);
  listEl.innerHTML = (!data||!data.length) ? '<div class="empty">No suggestions yet.</div>' :
    data.map(s => `<div class="sug-item"><span class="sug-name">${esc(s.name_text)}</span><span class="sug-by">${esc(s.employees?.full_name||s.employee_id)}</span><input type="checkbox" class="sug-check shortlist-cb-${contestId}" value="${s.id}"></div>`).join('');
  lucide.createIcons();
}

async function adminAddSuggestion(contestId) {
  const input = document.getElementById(`adminSugInput_${contestId}`);
  const text = input.value.trim();
  if (!text) { toast(`adminOwnSugMsg_${contestId}`, 'Enter a name.', 'error'); return; }
  const { error } = await db.from('suggestions').insert({ contest_id: contestId, employee_id: ME.employee_id, name_text: text });
  if (error) toast(`adminOwnSugMsg_${contestId}`, error.message, 'error');
  else { input.value = ''; await loadAdminSuggestionsFor(contestId); }
}

async function launchPollFor(contestId) {
  const checks = document.querySelectorAll(`.shortlist-cb-${contestId}:checked`);
  if (checks.length < 2) { toast(`adminSugMsg_${contestId}`, 'Select at least 2.', 'error'); return; }
  for (let cb of checks) {
    await db.from('shortlist').insert({ contest_id: contestId, suggestion_id: parseInt(cb.value) });
  }
  await db.from('contests').update({ status: 'poll', poll_start: new Date().toISOString() }).eq('id', contestId);
  renderAdminActiveContests();
}

async function loadAdminPollFor(contestId) {
  const container = document.getElementById(`adminPollSection_${contestId}`);
  container.innerHTML = `<div id="adminPollList_${contestId}"></div><button class="btn btn-danger mt16" onclick="endPollFor(${contestId})">End Poll</button>`;
  const { data: shortlist } = await db.from('shortlist').select('id, suggestions(name_text)').eq('contest_id', contestId);
  const { data: votes } = await db.from('votes').select('shortlist_id').eq('contest_id', contestId);
  const counts = {}; (votes||[]).forEach(v => counts[v.shortlist_id]=(counts[v.shortlist_id]||0)+1);
  const total = (votes||[]).length;
  document.getElementById(`adminPollList_${contestId}`).innerHTML = (shortlist||[]).map(s => {
    const pct = total ? Math.round((counts[s.id]||0)/total*100) : 0;
    return `<div class="vote-option" style="cursor:default;margin-bottom:8px;"><span class="voted-label">${esc(s.suggestions?.name_text)}</span><div class="vote-bar-wrap"><div class="vote-bar" style="width:${pct}%"></div></div><span class="vote-count-label">${counts[s.id]||0} (${pct}%)</span></div>`;
  }).join('');
}

async function endPollFor(contestId) {
  if (!confirm('End this poll and reveal results?')) return;
  await db.from('contests').update({ status: 'finished', poll_end: new Date().toISOString() }).eq('id', contestId);
  renderAdminActiveContests();
}

async function editContestInline(contestId) {
  const { data: c } = await db.from('contests').select('*').eq('id', contestId).single();
  if (!c) return;
  const form = document.createElement('div');
  form.className = 'card card-sm mt8';
  form.id = `editForm_${contestId}`;
  form.innerHTML = `
    <div class="field"><label>Title</label><input type="text" id="editTitle_${contestId}" value="${esc(c.title)}"></div>
    <div class="field"><label>Description</label><input type="text" id="editDesc_${contestId}" value="${esc(c.description||'')}"></div>
    <div class="field"><label>Type</label><input type="text" id="editType_${contestId}" value="${esc(c.type_label||'')}"></div>
    <div class="field"><label>Deadline</label><input type="datetime-local" id="editDeadline_${contestId}" value="${c.suggestion_end?.slice(0,16)||''}"></div>
    <button class="btn btn-accent btn-sm" onclick="saveContestEdit(${contestId})">Save</button>
    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('editForm_${contestId}').remove()">Cancel</button>`;
  document.getElementById(`adminContest_${contestId}`).appendChild(form);
  lucide.createIcons();
}

async function saveContestEdit(contestId) {
  const title = document.getElementById(`editTitle_${contestId}`).value.trim();
  const desc = document.getElementById(`editDesc_${contestId}`).value.trim();
  const type = document.getElementById(`editType_${contestId}`).value.trim();
  const deadline = document.getElementById(`editDeadline_${contestId}`).value;
  if (!title || !deadline) return alert('Title and deadline required.');
  await db.from('contests').update({ title, description: desc, type_label: type, suggestion_end: new Date(deadline).toISOString() }).eq('id', contestId);
  document.getElementById(`editForm_${contestId}`).remove();
  renderAdminActiveContests();
}

async function deleteContestById(contestId) {
  if (!confirm('Delete this contest and all its data?')) return;
  await db.from('votes').delete().eq('contest_id', contestId);
  await db.from('shortlist').delete().eq('contest_id', contestId);
  await db.from('suggestions').delete().eq('contest_id', contestId);
  await db.from('contests').delete().eq('id', contestId);
  renderAdminActiveContests();
}

async function renderAdminAllContests() {
  const { data: contests } = await db.from('contests').select('*').order('id',{ascending:false});
  let html = '<div class="page-head"><h2>All Contests</h2></div>';
  if (!contests||!contests.length) html += '<p>No contests.</p>';
  else {
    html += '<table class="admin-table"><tr><th>Title</th><th>Type</th><th>Status</th><th>Winner</th><th>By</th><th>Action</th></tr>';
    for (let c of contests) {
      let winnerName='-', winnerAuthor='-';
      if (c.status==='finished') {
        const { data: agg } = await db.from('votes').select('shortlist_id').eq('contest_id',c.id);
        if (agg && agg.length) {
          const cnts = {}; agg.forEach(v=>cnts[v.shortlist_id]=(cnts[v.shortlist_id]||0)+1);
          const top = Object.entries(cnts).sort((a,b)=>b[1]-a[1])[0];
          if (top) {
            const { data: si } = await db.from('shortlist').select('suggestions(name_text, employee_id, employees(full_name))').eq('id',top[0]).single();
            if (si) {
              winnerName = si.suggestions?.name_text||'?';
              winnerAuthor = si.suggestions?.employees?.full_name || si.suggestions?.employee_id || '?';
            }
          }
        }
      }
      html += `<tr><td>${esc(c.title)}</td><td>${c.type_label||'-'}</td><td><span class="status-tag tag-${c.status}">${c.status}</span></td><td>${winnerName}</td><td>${winnerAuthor}</td><td><button class="btn btn-danger btn-sm" onclick="deleteContestById(${c.id})">Delete</button></td></tr>`;
    }
    html += '</table>';
  }
  document.getElementById('adminContentArea').innerHTML = html;
  lucide.createIcons();
}

async function renderAdminEmployees() {
  const { data: emp } = await db.from('employees').select('*').order('employee_id');
  let html = '<div class="page-head"><h2>Employees</h2><table class="admin-table"><tr><th>ID</th><th>Name</th><th>Role</th><th>Status</th><th>Action</th></tr>';
  (emp||[]).forEach(e => {
    let action = '';
    if (e.status==='pending') action = `<button class="btn btn-accent btn-sm" onclick="approveEmployee('${e.employee_id}')">Approve</button><button class="btn btn-secondary btn-sm" onclick="rejectEmployee('${e.employee_id}')">Reject</button>`;
    else action = `<button class="btn btn-secondary btn-sm" onclick="toggleAdmin('${e.employee_id}')">${e.role==='admin'?'Demote':'Make Admin'}</button>`;
    html += `<tr><td>${esc(e.employee_id)}</td><td>${esc(e.full_name)}</td><td>${e.role}</td><td><span class="status-tag tag-${e.status==='approved'?'finished':e.status==='pending'?'suggestion':'poll'}">${e.status}</span></td><td>${action}</td></tr>`;
  });
  html += '</table></div>';
  document.getElementById('adminContentArea').innerHTML = html;
  lucide.createIcons();
}
async function approveEmployee(id) { await db.from('employees').update({status:'approved'}).eq('employee_id',id); renderAdminEmployees(); }
async function rejectEmployee(id) { await db.from('employees').update({status:'rejected'}).eq('employee_id',id); renderAdminEmployees(); }
async function toggleAdmin(id) {
  const { data } = await db.from('employees').select('role').eq('employee_id',id).single();
  await db.from('employees').update({role: data.role==='admin'?'employee':'admin'}).eq('employee_id',id);
  renderAdminEmployees();
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function setLoading(id, loading) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>' : (btn._orig || btn.innerHTML);
}
</script>
</body>
</html>
