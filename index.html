<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Poll Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* (Your existing CSS – exactly as you had it) */
  </style>
</head>
<body>
  <!-- (Your existing HTML – exactly as you had it) -->

  <script>
    // ========== REPLACE THESE TWO WITH YOUR REAL VALUES ==========
    const SUPABASE_URL = 'https://ooalljqzldtqelvvtnri.supabase.co';   // Keep your URL
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vYWxsanF6bGR0cWVsdnZ0bnJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjE4NzcsImV4cCI6MjA5MjU5Nzg3N30.KhPqEiCvgDKQLdYX-kLYNRejeNgilZYot6_slYFhYXY'; // ← full anon key from Supabase

    // Create the client only once – safe and clean
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Check if the client was created successfully (optional safety)
    if (!supabase || typeof supabase.from !== 'function') {
      console.error('Supabase client failed. Check your URL or anon key.');
    }

    let currentEmployeeId = null;
    let currentEmployee = null;
    let campaign = null;

    // ---------- helpers ----------
    function showLogin() {
      document.getElementById('loginView').classList.remove('hidden');
      document.getElementById('registerView').classList.add('hidden');
      document.getElementById('portalView').classList.add('hidden');
    }
    function showSignup() {
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('registerView').classList.remove('hidden');
      document.getElementById('portalView').classList.add('hidden');
    }

    // ---------- authentication ----------
    async function login() {
      const id = document.getElementById('empIdLogin').value.trim().toUpperCase();
      const msg = document.getElementById('loginMsg');
      msg.textContent = '';
      if (!id) { msg.textContent = 'Enter your employee ID.'; return; }
      try {
        const { data, error } = await supabase
          .from('employees')
          .select('*')
          .eq('employee_id', id)
          .single();
        if (error || !data) {
          msg.textContent = 'Employee ID not found. Please register first.';
          return;
        }
        currentEmployee = data;
        currentEmployeeId = data.employee_id;
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('registerView').classList.add('hidden');
        document.getElementById('portalView').classList.remove('hidden');
        await loadCampaignAndUI();
      } catch (err) {
        console.error(err);
        msg.textContent = 'Connection error. Check console.';
      }
    }

    async function register() {
      const empId = document.getElementById('regEmpId').value.trim().toUpperCase();
      const name = document.getElementById('regName').value.trim();
      const msg = document.getElementById('regMsg');
      msg.textContent = '';
      if (!empId || !name) { msg.textContent = 'All fields required.'; return; }
      try {
        const { error } = await supabase
          .from('employees')
          .insert({ employee_id: empId, full_name: name, role: 'employee' });
        if (error) {
          if (error.message.includes('duplicate key')) msg.textContent = 'This ID is already registered.';
          else msg.textContent = 'Error: ' + error.message;
          return;
        }
        msg.textContent = '✓ Registered! You can now log in.';
        setTimeout(showLogin, 1200);
      } catch (err) {
        console.error(err);
        msg.textContent = 'Connection error.';
      }
    }

    function logout() {
      currentEmployeeId = null;
      currentEmployee = null;
      campaign = null;
      document.getElementById('portalView').classList.add('hidden');
      showLogin();
    }

    // ---------- campaign & UI ----------
    async function loadCampaignAndUI() {
      try {
        const { data } = await supabase
          .from('campaigns')
          .select('*')
          .order('id', { ascending: true })
          .limit(1)
          .single();
        campaign = data;
        displayCampaignInfo();
        hideAllPanels();
        if (!campaign) return;

        if (campaign.status === 'suggestion') {
          document.getElementById('suggestionPanel').classList.remove('hidden');
          if (currentEmployee && currentEmployee.role === 'admin') {
            await loadAdminShortlist();
            document.getElementById('adminShortlistPanel').classList.remove('hidden');
          }
        } else if (campaign.status === 'poll') {
          await loadPollOptions();
          document.getElementById('pollPanel').classList.remove('hidden');
        } else if (campaign.status === 'finished') {
          await loadResults();
          document.getElementById('resultsPanel').classList.remove('hidden');
        }
      } catch (err) {
        console.error(err);
      }
    }

    function hideAllPanels() {
      document.getElementById('suggestionPanel').classList.add('hidden');
      document.getElementById('adminShortlistPanel').classList.add('hidden');
      document.getElementById('pollPanel').classList.add('hidden');
      document.getElementById('resultsPanel').classList.add('hidden');
    }

    function displayCampaignInfo() {
      const div = document.getElementById('campaignInfo');
      if (!campaign) {
        div.innerHTML = '<p>No campaign yet.</p>';
        return;
      }
      div.innerHTML = `
        <strong style="font-size:16px;">${campaign.title}</strong><br>
        <span class="badge">${campaign.status.toUpperCase()}</span>
        <span style="margin-left:8px;">
          Deadline: ${campaign.suggestion_end ? new Date(campaign.suggestion_end).toLocaleDateString() : 'N/A'}
        </span>
      `;
    }

    // ---------- suggestions ----------
    async function submitSuggestion() {
      const text = document.getElementById('suggestionInput').value.trim();
      const msg = document.getElementById('sugMsg');
      msg.textContent = '';
      if (!text) { msg.textContent = 'Please type a name.'; return; }
      const { error } = await supabase
        .from('suggestions')
        .insert({ campaign_id: campaign.id, employee_id: currentEmployeeId, name_text: text });
      if (error) msg.textContent = 'Error: ' + error.message;
      else {
        msg.textContent = '✓ Suggestion recorded.';
        document.getElementById('suggestionInput').value = '';
        if (currentEmployee.role === 'admin') await loadAdminShortlist();
      }
    }

    // ---------- admin shortlist ----------
    async function loadAdminShortlist() {
      const { data } = await supabase
        .from('suggestions')
        .select('id, name_text, employee_id, employees(full_name)')
        .eq('campaign_id', campaign.id);
      const container = document.getElementById('allSuggestionsList');
      if (!data || data.length === 0) {
        container.innerHTML = '<p>No suggestions yet.</p>';
        return;
      }
      container.innerHTML = data.map(s => `
        <div class="suggestion-item">
          <span>${s.name_text} <small>(by ${s.employees?.full_name || 'unknown'})</small></span>
          <input type="checkbox" class="shortlist-check" value="${s.id}">
        </div>
      `).join('');
    }

    async function saveShortlist() {
      const checks = document.querySelectorAll('.shortlist-check:checked');
      const ids = Array.from(checks).map(cb => parseInt(cb.value));
      const msg = document.getElementById('adminMsg');
      if (ids.length === 0) { msg.textContent = 'Select at least one.'; return; }
      const inserts = ids.map(sid => ({ campaign_id: campaign.id, suggestion_id: sid }));
      const { error } = await supabase.from('shortlist').insert(inserts);
      if (error) { msg.textContent = 'Error: ' + error.message; return; }
      await supabase
        .from('campaigns')
        .update({ status: 'poll', poll_start: new Date().toISOString() })
        .eq('id', campaign.id);
      msg.textContent = 'Poll is now live! Refreshing...';
      setTimeout(() => loadCampaignAndUI(), 1500);
    }

    // ---------- poll ----------
    async function loadPollOptions() {
      const { data } = await supabase
        .from('shortlist')
        .select('id, suggestions!inner(name_text)')
        .eq('campaign_id', campaign.id);
      const container = document.getElementById('pollOptionsList');
      if (!data || data.length === 0) {
        container.innerHTML = '<p>No options available.</p>';
        return;
      }
      container.innerHTML = data.map(opt => `
        <div class="option-item">
          <input type="radio" name="voteOption" value="${opt.id}" id="opt${opt.id}">
          <label for="opt${opt.id}">${opt.suggestions.name_text}</label>
        </div>
      `).join('');

      const { data: existing } = await supabase
        .from('votes')
        .select('id')
        .eq('campaign_id', campaign.id)
        .eq('employee_id', currentEmployeeId)
        .maybeSingle();
      if (existing) {
        document.getElementById('voteMsg').textContent = '✓ You have already voted.';
        document.querySelector('#pollPanel button').disabled = true;
      }
    }

    async function submitVote() {
      const selected = document.querySelector('input[name="voteOption"]:checked');
      const msg = document.getElementById('voteMsg');
      if (!selected) { msg.textContent = 'Select a name first.'; return; }
      const shortlistId = parseInt(selected.value);
      const { error } = await supabase
        .from('votes')
        .insert({ campaign_id: campaign.id, employee_id: currentEmployeeId, shortlist_id: shortlistId });
      if (error) {
        if (error.message.includes('duplicate key')) msg.textContent = 'You have already voted.';
        else msg.textContent = 'Error: ' + error.message;
      } else {
        msg.textContent = '✓ Vote recorded!';
        document.querySelector('#pollPanel button').disabled = true;
      }
    }

    // ---------- results ----------
    async function loadResults() {
      const { data: votes } = await supabase.from('votes').select('shortlist_id');
      const { data: shortlist } = await supabase
        .from('shortlist')
        .select('id, suggestions(name_text)')
        .eq('campaign_id', campaign.id);
      const counts = {};
      votes.forEach(v => counts[v.shortlist_id] = (counts[v.shortlist_id] || 0) + 1);
      const results = shortlist.map(s => ({
        name: s.suggestions.name_text,
        count: counts[s.id] || 0
      })).sort((a,b) => b.count - a.count);
      document.getElementById('resultsList').innerHTML = results.map((r, i) => `
        <div class="result-row">
          <span>${i+1}. ${r.name}</span>
          <span class="vote-count">${r.count} vote${r.count!==1?'s':''}</span>
        </div>
      `).join('');
    }

    // ---------- initial ----------
    window.addEventListener('load', () => {
      showLogin();
    });
  </script>
</body>
</html>
